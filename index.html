<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REGISTRO DE ALUNOS</title>
    <style>
      body {
        background-color: #0f172a; /* azul escuro */
        color: #e2e8f0;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
      }

      h1 {
        color: #60a5fa;
      }

      input,
      button {
        margin: 5px;
        padding: 10px;
        border-radius: 8px;
        border: none;
      }

      button {
        background-color: #1e293b;
        color: white;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background-color: #334155;
      }

      /* Container dos cards */
      #resultados {
        display: flex;
        flex-wrap: wrap; /* quebra linha automática */
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
      }

      /* Estilo dos cards */
      .card {
        background: linear-gradient(145deg, #1e293b, #0f172a);
        padding: 20px;
        width: 260px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        transition: all 0.3s ease;
        text-align: left;
      }

      .card h2 {
        color: #60a5fa;
        font-size: 18px;
        margin-bottom: 10px;
      }

      .card p {
        color: #cbd5f5;
        font-size: 14px;
        margin: 5px 0;
      }

      .card:hover {
        transform: translateY(-8px) scale(1.03);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
      }
    </style>
  </head>

  <body>
    <h1>CADASTRE SEU ALUNO</h1>
    <form id="formulario">
      <input type="text" id="nome" placeholder="Nome do aluno" required />
      <br />
      <input
        type="text"
        id="telefone"
        placeholder="Telefone do aluno"
        required
      />
      <br />
      <input type="text" id="email" placeholder="Email" required />
      <br />
      <button>Cadastrar</button>
    </form>
    <button id="exibir">Exibir Lista</button>
    <section id="resultados"></section>
    <script>
      const formulario = document.querySelector("#formulario");
      const nome = document.querySelector("#nome");
      const telefone = document.querySelector("#telefone");
      const email = document.querySelector("#email");

      const lista_de_alunos = [];

      formulario.addEventListener("submit", (evento) => {
        evento.preventDefault();
        const novo_aluno = {
          nome: nome.value,
          telefone: telefone.value,
          email: email.value,
        };
        lista_de_alunos.push(novo_aluno);
        localStorage.setItem("alunos", JSON.stringify(lista_de_alunos));
        formulario.reset();
        nome.focus();
      });

      const exibir = document.querySelector("#exibir");
      const resultados = document.querySelector("#resultados");

      exibir.addEventListener("click", () => {
        resultados.innerHTML = "";
        const lista_do_LS = JSON.parse(localStorage.getItem("alunos")) || [];
        lista_do_LS.forEach((element) => {
          const novo_card = document.createElement("div");
          novo_card.classList.add("card");

          const novo_nome = document.createElement("h2");
          novo_nome.textContent = element.nome;

          const novo_telefone = document.createElement("p");
          novo_telefone.textContent = element.telefone;

          const novo_email = document.createElement("p");
          novo_email.textContent = element.email;

          novo_card.append(novo_nome, novo_telefone, novo_email);
          resultados.append(novo_card);
        });
      });
    </script>
  </body>
</html>
